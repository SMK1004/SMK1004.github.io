<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMK1004</title>
<style>
  :root{
    --bg:#0e1013;
    --panel:#15181c;
    --panel2:#1a1e23;
    --line:#262b31;
    --text:#eceff1;
    --sub:#838d97;
    --brass:#c9a466;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    --serif: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
  }
  *{box-sizing:border-box;}
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css');
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .wrap{max-width:640px; width:100%;}
  h1{
    font-family:var(--serif);
    font-size:32px;
    font-weight:500;
    margin:0 0 8px;
    color:#f4f1ea;
  }
  .sub{color:var(--sub); margin:0 0 32px; font-size:15px;}
  .cards{display:grid; gap:14px;}
  a.card{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    text-decoration:none;
    color:var(--text);
    transition:border-color .15s ease, transform .15s ease;
  }
  a.card:hover{
    border-color:var(--brass);
    transform:translateY(-2px);
  }
  .icon{
    font-size:28px;
    width:48px; height:48px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel2);
    border-radius:10px;
    flex-shrink:0;
  }
  .card-title{font-size:18px; font-weight:600; margin-bottom:4px;}
  .card-desc{font-size:14px; color:var(--sub);}
</style>
</head>
<body>
<div class="wrap">
  <h1>SMK1004</h1>
  <p class="sub">BTC 헤지 트레이딩 도구</p>
  <div class="cards">
    <a class="card" href="calculator.html">
      <div class="icon">🧮</div>
      <div>
        <div class="card-title">포지션 계산기</div>
        <div class="card-desc">실시간 가격 · 청산가 계산 · 물타기/불타기 시뮬레이션</div>
      </div>
    </a>
    <a class="card" href="dashboard.html">
      <div class="icon">📊</div>
      <div>
        <div class="card-title">마켓 대시보드</div>
        <div class="card-desc">경제 캘린더 · 증시 뉴스 · AI 브리핑</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
