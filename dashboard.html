<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓 대시보드 · B헤지</title>
<style>
  :root{
    --bg:#0a0d12;
    --panel:#12161d;
    --panel-2:#171c25;
    --line:#232a36;
    --text:#e7ebf0;
    --muted:#7c8798;
    --long:#00d4aa;
    --short:#ff5c66;
    --amber:#ffb545;
    --mono: 'Pretendard', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    letter-spacing: -0.01em;
    -webkit-font-smoothing:antialiased;
  }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css');
  header{
    padding:20px 24px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  header h1{
    font-size:18px;
    margin:0;
    letter-spacing:0.02em;
    font-weight:600;
  }
  header h1 span{color:var(--long);}
  header .clock{
    font-family:var(--mono);
    color:var(--muted);
    font-size:13px;
  }
  main{
    max-width:1280px;
    margin:0 auto;
    padding:20px;
    display:grid;
    grid-template-columns: 1fr;
    gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .card-head h2{
    font-size:13px;
    margin:0;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    font-weight:600;
  }
  .card-body{padding:16px;}

  /* AI briefing */
  #briefing .card-body{min-height:64px;}
  .briefing-empty{
    color:var(--muted);
    font-size:14px;
    line-height:1.7;
  }
  .briefing-text{
    font-size:14px;
    line-height:1.8;
  }
  .briefing-text h2, .briefing-text h3, .briefing-text h4{
    font-size:14px;
    color:var(--amber);
    margin:14px 0 6px;
    font-weight:700;
  }
  .briefing-text ul{ margin:4px 0 10px; padding-left:20px; }
  .briefing-text li{ margin:4px 0; }
  .briefing-text strong{ color:#fff; }
  .briefing-text p{ margin:0 0 10px; }
  .btn{
    background:var(--long);
    color:#04140f;
    border:none;
    border-radius:6px;
    padding:8px 14px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    font-family:var(--sans);
  }
  .btn:disabled{opacity:0.5; cursor:default;}
  .btn.secondary{
    background:transparent;
    color:var(--muted);
    border:1px solid var(--line);
  }
  .meta-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .timestamp{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
  }

  /* grid split for calendar/news */
  .split{
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap:16px;
  }
  @media (max-width:900px){
    .split{grid-template-columns:1fr;}
  }

  .tv-embed{height:520px;}
  .tv-embed iframe{border:0;}

  .feed-empty{ color:var(--muted); font-size:13px; padding:20px 0; text-align:center; }
  .cal-item, .news-item{
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .cal-item:last-child, .news-item:last-child{ border-bottom:none; }
  .cal-top{ display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .cal-date{ font-family:var(--mono); color:var(--muted); font-size:11px; }
  .cal-imp{ font-size:10px; padding:1px 6px; border-radius:3px; font-weight:700; }
  .cal-imp.high{ background:rgba(255,92,102,0.15); color:var(--short); }
  .cal-imp.mid{ background:rgba(255,181,69,0.15); color:var(--amber); }
  .cal-title{ font-weight:600; }
  .cal-sub{ color:var(--muted); font-size:11px; margin-top:2px; font-family:var(--mono); }
  .news-item a{ color:var(--text); text-decoration:none; font-weight:600; }
  .news-item a:hover{ color:var(--long); }
  .news-time{ color:var(--muted); font-size:11px; font-family:var(--mono); margin-top:3px; }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    padding:24px;
  }

  .dot{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    margin-right:6px;
  }
  .dot.high{background:var(--short);}
  .dot.mid{background:var(--amber);}
  .dot.low{background:var(--muted);}
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:14px;">
    <a href="index.html" style="color:var(--muted); text-decoration:none; font-size:13px;">🏠 홈</a>
    <a href="calculator.html" style="color:var(--muted); text-decoration:none; font-size:13px;">🧮 계산기</a>
    <h1 style="margin-left:8px;">마켓 <span>대시보드</span></h1>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<main>

  <!-- AI Briefing -->
  <section class="card" id="briefing">
    <div class="card-head">
      <h2>AI 브리핑 · Gemini</h2>
      <div class="meta-row">
        <span class="timestamp" id="briefing-time">아직 생성 안 됨</span>
        <button class="btn" id="run-briefing">지금 분석</button>
      </div>
    </div>
    <div class="card-body">
      <div class="briefing-empty" id="briefing-content">
        "지금 분석" 버튼을 누르면 오늘/이번 주 주요 경제 이벤트를 중요도 순으로 정리하고,
        BTC 포지션 관점에서 참고할 만한 코멘트를 생성합니다.
      </div>
    </div>
  </section>

  <!-- Calendar + News -->
  <div class="split">
    <section class="card">
      <div class="card-head"><h2>경제 캘린더 (중요도 상위)</h2></div>
      <div class="card-body">
        <div id="calendarBody" class="feed-empty">불러오는 중...</div>
      </div>
    </section>

    <section class="card">
      <div class="card-head"><h2>증시 뉴스</h2></div>
      <div class="card-body">
        <div id="newsBody" class="feed-empty">불러오는 중...</div>
      </div>
    </section>
  </div>

</main>

<footer>market-dashboard · smk1004.github.io</footer>

<script>
  // ── Clock ──
  function tick(){
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ko-KR', { hour12:false });
  }
  setInterval(tick, 1000); tick();

  // ── Gemini AI Briefing ──
  // NOTE: This key is visible in page source since GitHub Pages is static hosting.
  // Restrict it by HTTP referrer in Google Cloud Console before real deployment.
  const GEMINI_API_KEY = "AQ.Ab8RN6LzkNEhi-GHXYOCfbZKG5XW8ek6xAym_mbLzeEVUJdYEA";
  const GEMINI_MODEL = "gemini-flash-latest";

  const runBtn = document.getElementById('run-briefing');
  const contentEl = document.getElementById('briefing-content');
  const timeEl = document.getElementById('briefing-time');

  // ── 경제 캘린더 (ForexFactory 공개 JSON, 위젯 없이 직접 fetch) ──
  async function loadCalendar(){
    const el = document.getElementById('calendarBody');
    try{
      const res = await fetch('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
      const data = await res.json();
      const important = data
        .filter(ev => ev.impact === 'High' || ev.impact === 'Medium')
        .filter(ev => ev.country === 'USD' || ev.country === 'KRW')
        .sort((a,b)=> new Date(a.date) - new Date(b.date))
        .slice(0, 5);

      if(important.length === 0){
        el.innerHTML = '<div class="feed-empty">이번 주 주요 이벤트가 없습니다.</div>';
        return;
      }

      el.innerHTML = important.map(ev=>{
        const d = new Date(ev.date);
        const kst = d.toLocaleString('ko-KR', { month:'long', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Asia/Seoul' });
        const impClass = ev.impact === 'High' ? 'high' : 'mid';
        const impLabel = ev.impact === 'High' ? '높음' : '보통';
        const detail = [ev.forecast ? `예상 ${ev.forecast}` : '', ev.previous ? `이전 ${ev.previous}` : ''].filter(Boolean).join(' · ');
        return `<div class="cal-item">
          <div class="cal-top">
            <span class="cal-imp ${impClass}">${impLabel}</span>
            <span class="cal-date">${kst} (한국시간)</span>
          </div>
          <div class="cal-title">${ev.title}</div>
          ${detail ? `<div class="cal-sub">${detail}</div>` : ''}
        </div>`;
      }).join('');
    }catch(err){
      el.innerHTML = '<div class="feed-empty">캘린더를 불러오지 못했습니다.</div>';
    }
  }

  // ── 증시/암호화폐 뉴스 (CryptoCompare 공개 API, 위젯 없이 직접 fetch) ──
  async function loadNews(){
    const el = document.getElementById('newsBody');
    try{
      const res = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&categories=BTC,Trading,Regulation');
      const data = await res.json();
      const items = (data?.Data || []).slice(0, 8);

      if(items.length === 0){
        el.innerHTML = '<div class="feed-empty">뉴스를 가져오지 못했습니다.</div>';
        return;
      }

      el.innerHTML = items.map(n=>{
        const t = new Date(n.published_on * 1000).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Asia/Seoul' });
        return `<div class="news-item">
          <a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
          <div class="news-time">${n.source_info?.name || n.source || ''} · ${t}</div>
        </div>`;
      }).join('');
    }catch(err){
      el.innerHTML = '<div class="feed-empty">뉴스를 불러오지 못했습니다.</div>';
    }
  }

  loadCalendar();
  loadNews();

  function mdToHtml(md){
    let html = md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/^### (.*)$/gm, '<h4>$1</h4>');
    html = html.replace(/^## (.*)$/gm, '<h3>$1</h3>');
    html = html.replace(/^# (.*)$/gm, '<h2>$1</h2>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/^(?:\*|-) (.*)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
    html = html.split(/\n{2,}/).map(block=>{
      if(block.trim().startsWith('<h') || block.trim().startsWith('<ul')) return block;
      return '<p>' + block.replace(/\n/g,'<br>') + '</p>';
    }).join('');
    return html;
  }

  async function runBriefing(){
    runBtn.disabled = true;
    runBtn.textContent = "분석 중...";
    contentEl.className = "briefing-empty";
    contentEl.textContent = "실시간 경제 지표 및 시장 상황을 확인하는 중입니다...";

    const today = new Date().toLocaleDateString('ko-KR', {
      year:'numeric', month:'long', day:'numeric', weekday:'long'
    });

    const prompt =
`오늘은 ${today}(한국시간)입니다.
Google Search로 오늘 및 이번 주 예정된 미국 주요 경제 지표 발표(CPI, PPI, PCE, 고용지표, FOMC, 금리결정 등)를 확인해서
아래 형식으로 한국어 브리핑을 작성해줘.

1. 이번 주 중요 이벤트 최대 5개를 중요도 순으로 나열 (날짜, 한국시간, 이벤트명, 왜 중요한지 한 줄)
2. BTC/암호화폐 시장에 영향을 줄 가능성이 있는 이벤트가 있다면 마지막에 짧게 코멘트

너무 길지 않게, 실전 트레이더가 빠르게 읽을 수 있는 간결한 문장으로 작성해줘.`;

    try{
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            tools: [{ google_search: {} }]
          })
        }
      );

      if(!res.ok){
        const errText = await res.text();
        throw new Error(`API 오류 (${res.status}): ${errText.slice(0,200)}`);
      }

      const data = await res.json();
      const parts = data?.candidates?.[0]?.content?.parts || [];
      const text = parts.map(p => p.text || "").join("\n").trim();

      contentEl.className = "briefing-text";
      contentEl.innerHTML = text ? mdToHtml(text) : "응답을 받았지만 내용이 비어 있습니다. 다시 시도해주세요.";
      timeEl.textContent = new Date().toLocaleString('ko-KR', { hour12:false });

    } catch(err){
      contentEl.className = "briefing-empty";
      contentEl.textContent = "분석 실패: " + err.message;
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = "지금 분석";
    }
  }

  runBtn.addEventListener('click', runBriefing);
</script>

</body>
</html>
