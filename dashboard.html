<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard · B헤지</title>
<style>
  :root{
    --bg:#0a0d12;
    --panel:#12161d;
    --panel-2:#171c25;
    --line:#232a36;
    --text:#e7ebf0;
    --muted:#7c8798;
    --long:#00d4aa;
    --short:#ff5c66;
    --amber:#ffb545;
    --mono: 'SFMono-Regular', 'JetBrains Mono', Consolas, monospace;
    --sans: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:20px 24px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  header h1{
    font-size:18px;
    margin:0;
    letter-spacing:0.02em;
    font-weight:600;
  }
  header h1 span{color:var(--long);}
  header .clock{
    font-family:var(--mono);
    color:var(--muted);
    font-size:13px;
  }
  main{
    max-width:1280px;
    margin:0 auto;
    padding:20px;
    display:grid;
    grid-template-columns: 1fr;
    gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .card-head h2{
    font-size:13px;
    margin:0;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    font-weight:600;
  }
  .card-body{padding:16px;}

  /* AI briefing */
  #briefing .card-body{min-height:64px;}
  .briefing-empty{
    color:var(--muted);
    font-size:14px;
    line-height:1.7;
  }
  .briefing-text{
    font-size:14px;
    line-height:1.8;
    white-space:pre-wrap;
  }
  .btn{
    background:var(--long);
    color:#04140f;
    border:none;
    border-radius:6px;
    padding:8px 14px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    font-family:var(--sans);
  }
  .btn:disabled{opacity:0.5; cursor:default;}
  .btn.secondary{
    background:transparent;
    color:var(--muted);
    border:1px solid var(--line);
  }
  .meta-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .timestamp{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
  }

  /* grid split for calendar/news */
  .split{
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap:16px;
  }
  @media (max-width:900px){
    .split{grid-template-columns:1fr;}
  }

  .tv-embed{height:520px;}
  .tv-embed iframe{border:0;}

  footer{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    padding:24px;
  }

  .dot{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    margin-right:6px;
  }
  .dot.high{background:var(--short);}
  .dot.mid{background:var(--amber);}
  .dot.low{background:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>Market <span>Dashboard</span></h1>
  <div class="clock" id="clock">--:--:--</div>
</header>

<main>

  <!-- AI Briefing -->
  <section class="card" id="briefing">
    <div class="card-head">
      <h2>AI 브리핑 · Gemini</h2>
      <div class="meta-row">
        <span class="timestamp" id="briefing-time">아직 생성 안 됨</span>
        <button class="btn" id="run-briefing">지금 분석</button>
      </div>
    </div>
    <div class="card-body">
      <div class="briefing-empty" id="briefing-content">
        "지금 분석" 버튼을 누르면 오늘/이번 주 주요 경제 이벤트를 중요도 순으로 정리하고,
        BTC 포지션 관점에서 참고할 만한 코멘트를 생성합니다.
      </div>
    </div>
  </section>

  <!-- Calendar + News -->
  <div class="split">
    <section class="card">
      <div class="card-head"><h2>경제 캘린더</h2></div>
      <div class="card-body" style="padding:0;">
        <div class="tv-embed">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embed/embed-widget-events.js" async>
            {
              "colorTheme": "dark",
              "isTransparent": true,
              "width": "100%",
              "height": "520",
              "locale": "kr",
              "importanceFilter": "-1,0,1",
              "countryFilter": "us,kr"
            }
            </script>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head"><h2>증시 뉴스</h2></div>
      <div class="card-body" style="padding:0;">
        <div class="tv-embed">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embed/embed-widget-timeline.js" async>
            {
              "feedMode": "market",
              "market": "crypto",
              "colorTheme": "dark",
              "isTransparent": true,
              "displayMode": "regular",
              "width": "100%",
              "height": "520",
              "locale": "kr"
            }
            </script>
          </div>
        </div>
      </div>
    </section>
  </div>

</main>

<footer>market-dashboard · smk1004.github.io</footer>

<script>
  // ── Clock ──
  function tick(){
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ko-KR', { hour12:false });
  }
  setInterval(tick, 1000); tick();

  // ── Gemini AI Briefing ──
  // NOTE: This key is visible in page source since GitHub Pages is static hosting.
  // Restrict it by HTTP referrer in Google Cloud Console before real deployment.
  const GEMINI_API_KEY = "AQ.Ab8RN6LzkNEhi-GHXYOCfbZKG5XW8ek6xAym_mbLzeEVUJdYEA";
  const GEMINI_MODEL = "gemini-2.5-flash";

  const runBtn = document.getElementById('run-briefing');
  const contentEl = document.getElementById('briefing-content');
  const timeEl = document.getElementById('briefing-time');

  async function runBriefing(){
    runBtn.disabled = true;
    runBtn.textContent = "분석 중...";
    contentEl.className = "briefing-empty";
    contentEl.textContent = "실시간 경제 지표 및 시장 상황을 확인하는 중입니다...";

    const today = new Date().toLocaleDateString('ko-KR', {
      year:'numeric', month:'long', day:'numeric', weekday:'long'
    });

    const prompt =
`오늘은 ${today}(한국시간)입니다.
Google Search로 오늘 및 이번 주 예정된 미국 주요 경제 지표 발표(CPI, PPI, PCE, 고용지표, FOMC, 금리결정 등)를 확인해서
아래 형식으로 한국어 브리핑을 작성해줘.

1. 이번 주 중요 이벤트 최대 5개를 중요도 순으로 나열 (날짜, 한국시간, 이벤트명, 왜 중요한지 한 줄)
2. BTC/암호화폐 시장에 영향을 줄 가능성이 있는 이벤트가 있다면 마지막에 짧게 코멘트

너무 길지 않게, 실전 트레이더가 빠르게 읽을 수 있는 간결한 문장으로 작성해줘.`;

    try{
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            tools: [{ google_search: {} }]
          })
        }
      );

      if(!res.ok){
        const errText = await res.text();
        throw new Error(`API 오류 (${res.status}): ${errText.slice(0,200)}`);
      }

      const data = await res.json();
      const parts = data?.candidates?.[0]?.content?.parts || [];
      const text = parts.map(p => p.text || "").join("\n").trim();

      contentEl.className = "briefing-text";
      contentEl.textContent = text || "응답을 받았지만 내용이 비어 있습니다. 다시 시도해주세요.";
      timeEl.textContent = new Date().toLocaleString('ko-KR', { hour12:false });

    } catch(err){
      contentEl.className = "briefing-empty";
      contentEl.textContent = "분석 실패: " + err.message;
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = "지금 분석";
    }
  }

  runBtn.addEventListener('click', runBriefing);
</script>

</body>
</html>
